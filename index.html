<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fernbit.exe</title>
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="desktop">

<div class="ascii-left">
<pre id="ascii-left"></pre>
</div>

<section class="window" aria-label="fernbit window">

<header class="title-bar">
<span class="title-text">fernbit.exe</span>

<div class="title-actions">
<span></span>
<span></span>
<span></span>
</div>

</header>

<div class="window-content">

<h1 class="brand">
<a href="transmissions.html" class="brand-link">fernbit</a>
</h1>

<p class="tagline type-target" data-text="one little bit of the web"></p>

<section class="fern-section">
<p>fern of the day</p>
<pre id="daily-fern"></pre>
</section>

<div class="terminal">

<div id="terminal-output">

<p>fernbit node online</p>
<p>type <span class="command">help</span> to see commands</p>

</div>

<div class="terminal-input-line">
<span>&gt;</span>
<input id="terminal-input" autocomplete="off" />
</div>

</div>

<section class="system-status">

<p>system status: online</p>
<p>signal strength: stable</p>
<p>internet weather: <span id="internet-weather">calm</span></p>
<p>last transmission received: <span id="last-updated"></span></p>

</section>

</div>
</section>

<div class="ascii-right">
<pre id="ascii-right"></pre>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
