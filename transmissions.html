<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>transmissions log</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="desktop">
      <section class="window" aria-label="transmissions window">
        <header class="title-bar">
          <span class="title-text">fernbit.exe</span>
          <div class="title-actions" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </header>

        <div class="window-content">
          <h1 class="brand">transmissions log</h1>
          <p class="tagline">public signal archive</p>

          <h2 class="comments-heading">leave a transmission</h2>
          <section class="comments" aria-label="transmissions comments">
            <script
              src="https://utteranc.es/client.js"
              repo="fernbit/fernbit.net"
              issue-term="pathname"
              label="transmission"
              theme="github-light"
              crossorigin="anonymous"
              async
            ></script>
          </section>

          <p class="back-link"><a href="index.html">&larr; return to main signal</a></p>
          <p class="cursor-line" aria-hidden="true">&gt; <span class="cursor">_</span></p>
        </div>
      </section>
    </main>
  </body>
</html>
